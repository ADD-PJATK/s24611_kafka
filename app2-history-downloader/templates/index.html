<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Downloader & Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>📊 Stock Data History Viewer</h1>
        <p class="subtitle">Fetch, view, and export historical stock data</p>

        <div class="controls">
            <div class="control-group">
                <label for="ticker-select">Select tickers (Ctrl+Click for multiple):</label>
                <select id="ticker-select" multiple size="8">
                    {% for ticker in tickers %}
                    <option value="{{ ticker }}">{{ ticker }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="control-group">
                <label for="duration">Time range (minutes):</label>
                <input type="number" id="duration" min="1" max="10" value="5">
                <small>Max 10 minutes (data retention limit)</small>
            </div>

            <button id="fetch-btn" onclick="fetchData()" class="primary-btn">📥 Fetch Data</button>
        </div>

        <div id="status" class="status-message"></div>

        <div id="results" class="results">
            <!-- Results will appear here -->
        </div>
    </div>

    <script src="{{ url_for('static', filename='viewer.js') }}"></script>
</body>

</html>
